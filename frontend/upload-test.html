<!DOCTYPE html> 
<html> 
<head> 
<title>Upload Test</title> 
</head> 
<body> 
<h2>Profile Picture Upload Test</h2> 
<div id="status"></div> 
<input type="file" id="fileInput" accept="image/*"> 
<button onclick="testUpload()">Upload</button> 
<script> 
const API_URL = 'https://sigma-store-api.onrender.com'; 
function getToken() { return localStorage.getItem('sigma_token'); } 
async function testUpload() { 
const file = document.getElementById('fileInput').files[0]; 
if (!file) { document.getElementById('status').innerHTML = 'Select a file first'; return; } 
const token = getToken(); 
if (!token) { document.getElementById('status').innerHTML = 'Not logged in'; return; } 
const formData = new FormData(); 
formData.append('profilePicture', file); 
document.getElementById('status').innerHTML = 'Uploading...'; 
try { 
const response = await fetch(API_URL + '/api/upload-profile-picture', { 
method: 'POST', 
headers: { 'Authorization': token }, 
body: formData 
}); 
const data = await response.json(); 
document.getElementById('status').innerHTML = JSON.stringify(data, null, 2); 
} catch(err) { 
document.getElementById('status').innerHTML = 'Error: ' + err.message; 
} 
} 
console.log('Token:', getToken()); 
</script> 
</body> 
</html>
