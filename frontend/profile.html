<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Store - My Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .profile-card h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e05a2a;
        }
        .btn {
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #4caf50;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #e05a2a;
            display: block;
        }
        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 24px;
        }
        body.dark .profile-card,
        body.dark .login-prompt {
            background: #1e293b;
        }
        body.dark .profile-card h2,
        body.dark .form-group label {
            color: #e2e8f0;
        }
        body.dark .form-group input {
            background: #334155;
            border-color: #475569;
            color: white;
        }
        @media (max-width: 768px) {
            .profile-container {
                padding: 1rem;
            }
            .profile-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="logo">σ SIGMA</a>
    <div class="nav">
        <a href="index.html">shop</a>
        <a href="reviews.html">reviews</a>
        <a href="about.html">about</a>
        <a href="blog.html">blog</a>
        <a href="privacy.html">privacy</a>
        <a href="wishlist.html">wishlist</a>
        <a href="terms.html">terms</a>
        <a href="refund.html">refund</a>
        <a href="track.html">track order</a>
        <a href="profile.html">profile</a>
        <a href="login.html" id="authLink">login</a>
    </div>
    <button class="dark-toggle" id="darkToggle">🌙</button>
    <a href="cart.html" class="cart-btn">cart (<span id="cartCount">0</span>)</a>
</div>

<main>
    <div class="profile-container">
        <div class="profile-header">
            <h1>My Profile</h1>
        </div>
        
        <div id="profileContent">
            <!-- Content will be loaded here -->
        </div>
    </div>
</main>

<footer>
    <p>Sigma Studio — Mardan, Pakistan</p>
    <p>WhatsApp: +92 325 9042317 | Email: sigma@example.com</p>
</footer>

<script src="config.js"></script>
<script src="navbar.js"></script>
<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    let currentUser = null;
    
    function getAuthToken() {
        var token = localStorage.getItem('sigma_token');
        if (token) return token;
        token = localStorage.getItem('authToken');
        return token;
    }
    
    function isLoggedIn() {
        var token = getAuthToken();
        var expiry = localStorage.getItem('sigma_token_expiry');
        if (!token) return false;
        if (expiry && Date.now() > parseInt(expiry)) {
            localStorage.removeItem('sigma_token');
            localStorage.removeItem('sigma_token_expiry');
            return false;
        }
        return true;
    }
    
    function loadProfile() {
        var token = getAuthToken();
        if (!token) return;
        
        fetch(API_URL + '/api/profile', {
            headers: { 'Authorization': token }
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.success && data.user) {
                currentUser = data.user;
                document.getElementById('profileName').value = currentUser.name || '';
                document.getElementById('profileEmail').value = currentUser.email || '';
            }
        })
        .catch(function(error) {
            console.error('Load profile error:', error);
        });
    }
    
    function loadProfilePicture() {
        var token = getAuthToken();
        if (!token) return;
        
        var img = document.getElementById('profileImage');
        if (!img) return;
        
        fetch(API_URL + '/api/profile-picture', {
            headers: { 'Authorization': token }
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.profilePicture) {
                img.src = API_URL + data.profilePicture + '?t=' + Date.now();
            } else {
                img.src = 'https://placehold.co/120x120/ccc/white?text=No+Image';
            }
        })
        .catch(function(error) {
            console.error('Load picture error:', error);
        });
    }
    
    function updateProfile() {
        var name = document.getElementById('profileName').value.trim();
        var email = document.getElementById('profileEmail').value.trim();
        var messageDiv = document.getElementById('profileMessage');
        var token = getAuthToken();
        
        if (!name && !email) {
            messageDiv.textContent = 'Nothing to update';
            messageDiv.className = 'message error';
            return;
        }
        
        fetch(API_URL + '/api/profile', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            },
            body: JSON.stringify({ name: name, email: email })
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.success) {
                messageDiv.textContent = 'Profile updated successfully!';
                messageDiv.className = 'message success';
                setTimeout(function() { messageDiv.style.display = 'none'; }, 3000);
                var storedUser = localStorage.getItem('sigma_user');
                if (storedUser) {
                    var user = JSON.parse(storedUser);
                    if (name) user.name = name;
                    if (email) user.email = email;
                    localStorage.setItem('sigma_user', JSON.stringify(user));
                }
                if (typeof updateAuthLink === 'function') updateAuthLink();
            } else {
                messageDiv.textContent = data.error || 'Update failed';
                messageDiv.className = 'message error';
            }
        })
        .catch(function(error) {
            messageDiv.textContent = 'Error: ' + error.message;
            messageDiv.className = 'message error';
        });
    }
    
    function changePassword() {
        var currentPassword = document.getElementById('currentPassword').value;
        var newPassword = document.getElementById('newPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var messageDiv = document.getElementById('passwordMessage');
        var token = getAuthToken();
        
        if (!currentPassword || !newPassword || !confirmPassword) {
            messageDiv.textContent = 'Please fill all fields';
            messageDiv.className = 'message error';
            return;
        }
        
        if (newPassword !== confirmPassword) {
            messageDiv.textContent = 'New passwords do not match';
            messageDiv.className = 'message error';
            return;
        }
        
        if (newPassword.length < 6) {
            messageDiv.textContent = 'Password must be at least 6 characters';
            messageDiv.className = 'message error';
            return;
        }
        
        fetch(API_URL + '/api/change-password', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            },
            body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword })
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.success) {
                messageDiv.textContent = 'Password changed successfully!';
                messageDiv.className = 'message success';
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                setTimeout(function() { messageDiv.style.display = 'none'; }, 3000);
            } else {
                messageDiv.textContent = data.error || 'Password change failed';
                messageDiv.className = 'message error';
            }
        })
        .catch(function(error) {
            messageDiv.textContent = 'Error: ' + error.message;
            messageDiv.className = 'message error';
        });
    }
    
    function uploadProfilePicture(input) {
        var file = input.files[0];
        if (!file) return;
        
        if (file.size > 2 * 1024 * 1024) {
            alert('File too large! Maximum 2MB');
            return;
        }
        
        var token = getAuthToken();
        var formData = new FormData();
        formData.append('profilePicture', file);
        
        var messageDiv = document.getElementById('pictureMessage');
        messageDiv.textContent = 'Uploading...';
        messageDiv.className = 'message info';
        messageDiv.style.display = 'block';
        
        fetch(API_URL + '/api/upload-profile-picture', {
            method: 'POST',
            headers: {
                'Authorization': token
            },
            body: formData
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.success) {
                messageDiv.textContent = 'Profile picture updated!';
                messageDiv.className = 'message success';
                setTimeout(function() { messageDiv.style.display = 'none'; }, 3000);
                var img = document.getElementById('profileImage');
                img.src = API_URL + data.profilePicture + '?t=' + Date.now();
            } else {
                messageDiv.textContent = data.error || 'Upload failed';
                messageDiv.className = 'message error';
            }
        })
        .catch(function(error) {
            console.error('Upload error:', error);
            messageDiv.textContent = 'Error uploading picture: ' + error.message;
            messageDiv.className = 'message error';
        });
        
        input.value = '';
    }
    
    function removeProfilePicture() {
        if (!confirm('Remove your profile picture?')) return;
        
        var token = getAuthToken();
        var messageDiv = document.getElementById('pictureMessage');
        
        messageDiv.textContent = 'Removing...';
        messageDiv.className = 'message info';
        messageDiv.style.display = 'block';
        
        fetch(API_URL + '/api/profile-picture', {
            method: 'DELETE',
            headers: { 'Authorization': token }
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.success) {
                messageDiv.textContent = 'Profile picture removed!';
                messageDiv.className = 'message success';
                setTimeout(function() { messageDiv.style.display = 'none'; }, 3000);
                document.getElementById('profileImage').src = 'https://placehold.co/120x120/ccc/white?text=No+Image';
            } else {
                messageDiv.textContent = data.error || 'Remove failed';
                messageDiv.className = 'message error';
            }
        })
        .catch(function(error) {
            console.error('Remove error:', error);
            messageDiv.textContent = 'Error removing picture';
            messageDiv.className = 'message error';
        });
    }
    
    function loadOrders() {
        var token = getAuthToken();
        var ordersDiv = document.getElementById('ordersList');
        
        if (!ordersDiv) return;
        
        ordersDiv.innerHTML = '<div style="text-align:center; padding:20px;">Loading orders...</div>';
        
        fetch(API_URL + '/api/my-orders', {
            headers: { 'Authorization': token }
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            var orders = data.orders || [];
            
            if (orders.length === 0) {
                ordersDiv.innerHTML = '<div style="text-align:center; padding:20px;">No orders yet. Start shopping!</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < orders.length; i++) {
                var order = orders[i];
                var statusClass = '';
                if (order.status === 'pending') statusClass = 'status-pending';
                else if (order.status === 'processing') statusClass = 'status-processing';
                else if (order.status === 'shipped') statusClass = 'status-shipped';
                else if (order.status === 'delivered') statusClass = 'status-delivered';
                
                var itemsHtml = '';
                if (order.items && order.items.length > 0) {
                    var itemNames = [];
                    for (var j = 0; j < order.items.length; j++) {
                        itemNames.push(order.items[j].name + ' x ' + order.items[j].quantity);
                    }
                    itemsHtml = itemNames.join(', ');
                }
                
                html += '<div class="order-item" style="background:#f8f9fa; border-radius:12px; padding:1rem; margin-bottom:1rem; border-left:4px solid #e05a2a;">' +
                    '<div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">' +
                    '<span style="font-weight:bold; color:#e05a2a;">Order #' + order.order_id + '</span>' +
                    '<span class="' + statusClass + '">' + (order.status || 'pending') + '</span>' +
                    '</div>' +
                    '<div style="font-size:0.9rem; color:#666;">Items: ' + itemsHtml + '</div>' +
                    '<div style="font-weight:bold;">Total: $' + (order.total || 0) + '</div>' +
                    '<div style="font-size:0.8rem; color:#888;">Date: ' + new Date(order.created_at).toLocaleDateString() + '</div>' +
                    '</div>';
            }
            ordersDiv.innerHTML = html;
        })
        .catch(function(error) {
            console.error('Load orders error:', error);
            ordersDiv.innerHTML = '<div style="text-align:center; padding:20px;">Error loading orders</div>';
        });
    }
    
    function renderPage() {
        var container = document.getElementById('profileContent');
        
        if (!container) {
            console.error('Profile content container not found');
            return;
        }
        
        if (!isLoggedIn()) {
            container.innerHTML = '<div class="login-prompt"><h3>Please Login</h3><p>You need to be logged in to view your profile.</p><a href="login.html" class="btn" style="display: inline-block; margin-top: 1rem;">Login Now →</a></div>';
            return;
        }
        
        container.innerHTML = `
            <div class="profile-card">
                <h2>Profile Picture</h2>
                <div style="text-align: center;">
                    <div id="profilePictureContainer" style="margin-bottom: 1rem;">
                        <img id="profileImage" src="https://placehold.co/120x120/ccc/white?text=No+Image" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #e05a2a;">
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <label for="pictureUpload" style="background: linear-gradient(135deg, #e05a2a, #ff8c42); color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer;">Upload Picture</label>
                        <input type="file" id="pictureUpload" accept="image/*" style="display: none;" onchange="uploadProfilePicture(this)">
                        <button id="removePictureBtn" onclick="removeProfilePicture()" style="background: #e05a2a; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer;">Remove Picture</button>
                    </div>
                    <div id="pictureMessage" class="message" style="margin-top: 1rem;"></div>
                </div>
            </div>
            
            <div class="profile-card">
                <h2>Personal Information</h2>
                <div id="profileMessage" class="message"></div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profileName">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="profileEmail">
                </div>
                <button class="btn" onclick="updateProfile()">Update Profile</button>
            </div>
            
            <div class="profile-card">
                <h2>Change Password</h2>
                <div id="passwordMessage" class="message"></div>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <button class="btn" onclick="changePassword()">Change Password</button>
            </div>
            
            <div class="profile-card">
                <h2>Order History</h2>
                <div id="ordersList"></div>
            </div>
        `;
        
        loadProfile();
        loadOrders();
        loadProfilePicture();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        updateCartCount();
        renderPage();
    });
    
    window.updateProfile = updateProfile;
    window.changePassword = changePassword;
    window.uploadProfilePicture = uploadProfilePicture;
    window.removeProfilePicture = removeProfilePicture;
</script>
</body>
</html>
