<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Store - Login / Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #e05a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            padding: 30px;
            text-align: center;
        }
        
        .auth-header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .auth-header p {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }
        
        .tab-btn.active {
            color: #e05a2a;
            border-bottom: 2px solid #e05a2a;
        }
        
        .auth-form {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e05a2a;
            box-shadow: 0 0 0 3px rgba(224,90,42,0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(224,90,42,0.4);
        }
        
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        .message.error {
            background: #ffebee;
            color: #e05a2a;
            display: block;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #4caf50;
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #e05a2a;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        body.dark .auth-container {
            background: #1e293b;
        }
        
        body.dark .form-group label {
            color: #e2e8f0;
        }
        
        body.dark .form-group input {
            background: #334155;
            border-color: #475569;
            color: white;
        }
        
        body.dark .tab-btn {
            color: #94a3b8;
        }
        
        body.dark .tab-btn.active {
            color: #e05a2a;
        }
        
        @media (max-width: 480px) {
            .auth-container {
                margin: 10px;
            }
            .auth-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>SIGMA STORE</h1>
        <p>Your E-Commerce Platform</p>
    </div>
    
    <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    
    <div id="loginForm" class="auth-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="rememberMe" checked>
            <label>Remember me</label>
        </div>
        <button class="submit-btn" onclick="handleLogin()">Login</button>
        <div id="loginMessage" class="message"></div>
        <div class="back-link">
            <a href="index.html">Back to Shop</a>
        </div>
    </div>
    
    <div id="signupForm" class="auth-form" style="display: none;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="signupRemember" checked>
            <label>Keep me logged in</label>
        </div>
        <button class="submit-btn" onclick="handleSignup()">Create Account</button>
        <div id="signupMessage" class="message"></div>
        <div class="back-link">
            <a href="index.html">Back to Shop</a>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    var API_URL = window.BACKEND_URL;
    
    function switchTab(tab) {
        var loginForm = document.getElementById('loginForm');
        var signupForm = document.getElementById('signupForm');
        var tabs = document.querySelectorAll('.tab-btn');
        
        if (tab === 'login') {
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }
    
    function setAuthToken(token, remember) {
        var expiryDays = remember ? 30 : 7;
        var expiry = Date.now() + (expiryDays * 24 * 60 * 60 * 1000);
        localStorage.setItem('sigma_token', token);
        localStorage.setItem('sigma_token_expiry', expiry.toString());
    }
    
    async function handleLogin() {
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        var remember = document.getElementById('rememberMe').checked;
        var messageDiv = document.getElementById('loginMessage');
        
        if (!email || !password) {
            messageDiv.textContent = 'Please enter email and password';
            messageDiv.className = 'message error';
            return;
        }
        
        messageDiv.textContent = 'Logging in...';
        messageDiv.className = 'message';
        messageDiv.style.display = 'block';
        
        try {
            var response = await fetch(API_URL + '/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password, remember: remember })
            });
            
            var data = await response.json();
            
            if (response.ok && data.token) {
                setAuthToken(data.token, remember);
                localStorage.setItem('sigma_user', JSON.stringify(data.user));
                
                messageDiv.textContent = 'Login successful! Redirecting...';
                messageDiv.className = 'message success';
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                messageDiv.textContent = data.error || 'Login failed. Invalid email or password.';
                messageDiv.className = 'message error';
            }
        } catch (error) {
            console.error('Login error:', error);
            messageDiv.textContent = 'Cannot connect to server. Please try again.';
            messageDiv.className = 'message error';
        }
    }
    
    async function handleSignup() {
        var name = document.getElementById('signupName').value.trim();
        var email = document.getElementById('signupEmail').value.trim();
        var password = document.getElementById('signupPassword').value;
        var remember = document.getElementById('signupRemember').checked;
        var messageDiv = document.getElementById('signupMessage');
        
        if (!name || !email || !password) {
            messageDiv.textContent = 'Please fill all fields';
            messageDiv.className = 'message error';
            return;
        }
        
        if (password.length < 6) {
            messageDiv.textContent = 'Password must be at least 6 characters';
            messageDiv.className = 'message error';
            return;
        }
        
        messageDiv.textContent = 'Creating account...';
        messageDiv.className = 'message';
        messageDiv.style.display = 'block';
        
        try {
            var response = await fetch(API_URL + '/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, password: password, remember: remember })
            });
            
            var data = await response.json();
            
            if (response.ok && data.token) {
                setAuthToken(data.token, remember);
                localStorage.setItem('sigma_user', JSON.stringify(data.user));
                
                messageDiv.textContent = 'Account created successfully! Redirecting...';
                messageDiv.className = 'message success';
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                messageDiv.textContent = data.error || 'Signup failed. Email may already exist.';
                messageDiv.className = 'message error';
            }
        } catch (error) {
            console.error('Signup error:', error);
            messageDiv.textContent = 'Cannot connect to server. Please try again.';
            messageDiv.className = 'message error';
        }
    }
    
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    
    document.getElementById('signupPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleSignup();
    });
    
    (function checkExistingSession() {
        var token = localStorage.getItem('sigma_token');
        var expiry = localStorage.getItem('sigma_token_expiry');
        
        if (token && expiry && Date.now() < parseInt(expiry)) {
            window.location.href = 'index.html';
        }
    })();
</script>

</body>
