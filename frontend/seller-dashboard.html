<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    
    function getAuthToken() {
        return localStorage.getItem('authToken');
    }
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cartCount').innerText = total;
    }
    
    document.getElementById('darkToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('darkToggle').innerText = isDark ? 'â˜€ï¸' : 'ðŸŒ™';
        localStorage.setItem('sigma_dark', isDark);
    });
    
    if (localStorage.getItem('sigma_dark') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkToggle').innerText = 'â˜€ï¸';
    }
    
    async function loadDashboard() {
        const token = getAuthToken();
        
        if (!token) {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerHTML = ' Please login first. <a href="login.html">Click here to login</a>';
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/seller/dashboard`, {
                headers: {
                    'Authorization': token
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('authToken');
                window.location.href = 'login.html';
                return;
            }
            
            if (response.status === 404) {
                document.getElementById('loadingMsg').innerHTML = '<a href="seller-signup.html">Apply to become a seller</a>';
                return;
            }
            
            if (!response.ok) {
                throw new Error('Failed to load');
            }
            
            const data = await response.json();
            
            document.getElementById('totalSales').innerText = data.seller.totalSales || 0;
            document.getElementById('balance').innerText = data.seller.balance || 0;
            document.getElementById('productCount').innerText = data.stats?.totalProducts || 0;
            document.getElementById('orderCount').innerText = data.stats?.totalOrders || 0;
            
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            
        } catch(error) {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerHTML = ' Cannot connect to server. Make sure backend is running on port 3000';
        }
    }
    
    updateCartCount();
    loadDashboard();
</script>
