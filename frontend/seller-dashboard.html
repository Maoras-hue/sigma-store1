<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Store - Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-header {
            margin-bottom: 2rem;
        }
        
        .dashboard-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e05a2a;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #1a1a2e, #2c3e50);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            transform: translateY(-2px);
        }
        
        .status-pending {
            background: #ff9800;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        
        .status-approved {
            background: #4caf50;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        
        .status-rejected {
            background: #e05a2a;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        
        .apply-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        
        .apply-btn {
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        
        .login-prompt {
            background: #fff3e0;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }
        
        body.dark .stat-card,
        body.dark .apply-section {
            background: #1e293b;
        }
        
        body.dark .stat-label {
            color: #94a3b8;
        }
        
        body.dark .login-prompt {
            background: #1b5e20;
            color: white;
        }
        
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="logo">σ SIGMA</a>
    <div class="nav">
        <a href="index.html">shop</a>
        <a href="reviews.html">reviews</a>
        <a href="about.html">about</a>
        <a href="blog.html">blog</a>
        <a href="privacy.html">privacy</a>
        <a href="wishlist.html">wishlist</a>
        <a href="terms.html">terms</a>
        <a href="refund.html">refund</a>
        <a href="track.html">track order</a>
        <a href="login.html" id="authLink">login</a>
    </div>
    <button class="dark-toggle" id="darkToggle">🌙</button>
    <a href="cart.html" class="cart-btn">cart (<span id="cartCount">0</span>)</a>
</div>

<main>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>🏪 Seller Dashboard</h1>
        </div>
        
        <div id="dashboardContent">
            <!-- Content will be loaded here -->
        </div>
    </div>
</main>

<footer>
    <p>Sigma Studio — Mardan, Pakistan</p>
    <p>WhatsApp: +92 325 9042317 | Email: sigma@example.com</p>
</footer>

<script src="config.js"></script>
<script src="navbar.js"></script>
<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    
    // ============================================
    // CHECK LOGIN STATUS
    // ============================================
    
    function getAuthToken() {
        return localStorage.getItem('authToken');
    }
    
    function isLoggedIn() {
        const token = getAuthToken();
        const expiry = localStorage.getItem('authTokenExpiry');
        if (!token || !expiry) return false;
        return Date.now() < parseInt(expiry);
    }
    
    // ============================================
    // LOAD DASHBOARD
    // ============================================
    
    async function loadDashboard() {
        const container = document.getElementById('dashboardContent');
        
        if (!isLoggedIn()) {
            container.innerHTML = `
                <div class="login-prompt">
                    <h3>🔐 Please Login</h3>
                    <p>You need to be logged in to access the seller dashboard.</p>
                    <a href="login.html" class="action-btn" style="margin-top: 1rem; display: inline-block;">Login Now →</a>
                </div>
            `;
            return;
        }
        
        const token = getAuthToken();
        
        try {
            const response = await fetch(`${API_URL}/api/seller/dashboard`, {
                headers: { 'Authorization': token }
            });
            
            if (response.status === 404) {
                // Not a seller yet
                container.innerHTML = `
                    <div class="apply-section">
                        <h3>📝 Become a Seller</h3>
                        <p>Sell your own products on Sigma Store. Reach thousands of customers!</p>
                        <p><strong>Benefits:</strong> 90% commission, no monthly fees, instant payouts</p>
                        <a href="seller-signup.html" class="apply-btn">Apply Now →</a>
                    </div>
                `;
                return;
            }
            
            if (response.status === 401) {
                container.innerHTML = `
                    <div class="login-prompt">
                        <h3>🔐 Session Expired</h3>
                        <p>Please login again.</p>
                        <a href="login.html" class="action-btn" style="margin-top: 1rem; display: inline-block;">Login Now →</a>
                    </div>
                `;
                return;
            }
            
            if (!response.ok) {
                container.innerHTML = `
                    <div class="apply-section">
                        <h3>⚠️ Error Loading Dashboard</h3>
                        <p>Please try again later.</p>
                        <a href="index.html" class="action-btn" style="margin-top: 1rem; display: inline-block;">Back to Shop →</a>
                    </div>
                `;
                return;
            }
            
            const data = await response.json();
            const seller = data.seller;
            const stats = data.stats;
            
            let statusClass = '';
            let statusText = '';
            
            if (seller.status === 'pending') {
                statusClass = 'status-pending';
                statusText = 'Pending Approval';
            } else if (seller.status === 'approved') {
                statusClass = 'status-approved';
                statusText = 'Approved ✓';
            } else if (seller.status === 'rejected') {
                statusClass = 'status-rejected';
                statusText = 'Rejected ✗';
            }
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalProducts || 0}</div>
                        <div class="stat-label">Total Products</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalOrders || 0}</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">$${stats.totalSales || 0}</div>
                        <div class="stat-label">Total Sales</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">$${stats.balance || 0}</div>
                        <div class="stat-label">Balance</div>
                    </div>
                </div>
                
                <div style="background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                        <div>
                            <h3 style="margin-bottom: 0.5rem;">🏪 ${seller.store_name}</h3>
                            <p style="color: #666;">Status: <span class="${statusClass}">${statusText}</span></p>
                        </div>
                        <div>
                            <span style="color: #666;">Commission Rate: 10%</span>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <a href="seller-add-product.html" class="action-btn">➕ Add New Product</a>
                    <a href="seller-products.html" class="action-btn">📦 My Products</a>
                    <a href="seller-orders.html" class="action-btn">📋 My Orders</a>
                </div>
                
                <div style="background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 1rem;">💡 Seller Tips</h3>
                    <ul style="margin-left: 1.5rem; color: #666;">
                        <li>Add high-quality product images to increase sales</li>
                        <li>Respond to customer inquiries quickly</li>
                        <li>Keep your products updated with accurate pricing</li>
                        <li>Promote your products on social media</li>
                    </ul>
                </div>
            `;
            
        } catch (error) {
            console.error('Dashboard error:', error);
            container.innerHTML = `
                <div class="apply-section">
                    <h3>⚠️ Connection Error</h3>
                    <p>Cannot connect to server. Please check your internet connection.</p>
                    <button onclick="location.reload()" class="action-btn" style="margin-top: 1rem;">Retry →</button>
                </div>
            `;
        }
    }
    
    // ============================================
    // INITIALIZE
    // ============================================
    
    document.addEventListener('DOMContentLoaded', () => {
        updateCartCount();
        loadDashboard();
    });
</script>

</body>
</html>
