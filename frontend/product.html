<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Sigma Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .product-detail { display: flex; gap: 2rem; flex-wrap: wrap; background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .product-image { flex: 1; }
        .product-image img { width: 100%; border-radius: 16px; }
        .product-info { flex: 1; }
        .product-name { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
        .product-price { font-size: 2rem; color: #e05a2a; font-weight: 800; margin: 1rem 0; }
        .qr-section { text-align: center; margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 16px; }
        .qr-code { max-width: 200px; margin: 0 auto; }
        .qr-code img { width: 100%; border-radius: 12px; }
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #e05a2a, #ff8c42); color: white; border: none; }
        .btn-secondary { background: #2196f3; color: white; border: none; }
        .btn-outline { background: transparent; border: 2px solid #e05a2a; color: #e05a2a; }
        body.dark .product-detail { background: #1e293b; }
        body.dark .qr-section { background: #0f172a; }
        @media (max-width: 768px) { .product-container { padding: 1rem; } .product-detail { flex-direction: column; } }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="logo">σ SIGMA</a>
    <div class="nav">
        <a href="index.html">shop</a>
        <a href="reviews.html">reviews</a>
        <a href="about.html">about</a>
        <a href="wishlist.html">wishlist</a>
        <a href="login.html" id="authLink">login</a>
    </div>
    <button class="dark-toggle" id="darkToggle">🌙</button>
    <a href="cart.html" class="cart-btn">cart (<span id="cartCount">0</span>)</a>
</div>

<main>
    <div class="product-container" id="productContainer">
        <div id="productContent">Loading...</div>
    </div>
</main>

<footer>
    <p>Sigma Studio — Mardan, Pakistan</p>
</footer>

<script src="config.js"></script>
<script src="navbar.js"></script>
<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    let currentProduct = null;
    
    async function loadProduct() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        if (!productId) {
            document.getElementById('productContent').innerHTML = '<p style="text-align:center; padding:40px;">❌ Product not found</p>';
            return;
        }
        
        try {
            const productRes = await fetch(`${API_URL}/api/products/${productId}`);
            const product = await productRes.json();
            currentProduct = product;
            
            const ratingRes = await fetch(`${API_URL}/api/products/${productId}/rating`);
            const ratingData = await ratingRes.json();
            const rating = ratingData.averageRating || 0;
            const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
            
            const qrRes = await fetch(`${API_URL}/api/product/qr/${productId}`);
            const qrData = await qrRes.json();
            
            document.getElementById('productContent').innerHTML = `
                <div class="product-detail">
                    <div class="product-image">
                        <img src="${getProductImage(product)}" onerror="this.src='https://placehold.co/400x400/ff6b6b/white?text=Error'">
                    </div>
                    <div class="product-info">
                        <h1 class="product-name">${escapeHtml(product.name)}</h1>
                        <div style="margin: 0.5rem 0;">
                            <span style="color:#ffc107;">${stars}</span>
                            <span style="color:#888;"> (${rating.toFixed(1)})</span>
                        </div>
                        <div class="product-price">$${product.price}</div>
                        <p>${product.description || 'No description available.'}</p>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="addToCartAndContinue('${product.id}', '${escapeHtml(product.name)}', ${product.price})">Add to Cart</button>
                            <button class="btn btn-secondary" onclick="buyNow('${product.id}', '${escapeHtml(product.name)}', ${product.price})">Buy Now</button>
                        </div>
                        
                        <div class="qr-section">
                            <h3>📱 Scan to Share</h3>
                            <div class="qr-code">
                                <img id="qrImg" src="${qrData.qrCode}" alt="QR Code">
                            </div>
                            <p>Scan with your phone to view this product</p>
                            <div class="btn-group">
                                <a href="${API_URL}/api/product/qr/download/${productId}" download="qr-${product.id}.png" class="btn btn-outline">⬇️ Download QR</a>
                                <button class="btn btn-outline" onclick="copyProductLink()">🔗 Copy Link</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('productContent').innerHTML = '<p style="text-align:center; padding:40px;">❌ Error loading product</p>';
        }
    }
    
    function getProductImage(product) {
        if (!product.image) return `https://placehold.co/400x400/1a1a2e/white?text=${encodeURIComponent(product.name)}`;
        if (product.image.startsWith('http')) return product.image;
        return API_URL + product.image;
    }
    
    function addToCartAndContinue(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else cart.push({ id, name, price, quantity: 1 });
        localStorage.setItem('sigma_cart', JSON.stringify(cart));
        updateCartCount();
        alert(`${name} added to cart!`);
    }
    
    function buyNow(id, name, price) {
        addToCartAndContinue(id, name, price);
        window.location.href = 'cart.html';
    }
    
    function copyProductLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url);
        alert('Product link copied to clipboard!');
    }
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        const badge = document.getElementById('cartCount');
        if (badge) badge.innerText = total;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Dark mode
    const darkToggle = document.getElementById('darkToggle');
    if (darkToggle) {
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('sigma_dark', isDark);
            darkToggle.innerText = isDark ? '☀️' : '🌙';
        });
        if (localStorage.getItem('sigma_dark') === 'true') {
            document.body.classList.add('dark');
            darkToggle.innerText = '☀️';
        }
    }
    
    loadProduct();
    updateCartCount();
</script>
</body>
</html>
