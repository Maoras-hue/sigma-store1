<script>
    const BACKEND_URL = 'http://127.0.0.1:3000';
    let wishlistProducts = [];

    // Load all products
    async function loadProducts() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/products`);
            wishlistProducts = await response.json();
            renderWishlist();
        } catch (error) {
            console.error('Error loading products:', error);
            document.getElementById('wishlistGrid').innerHTML = 
                '<p style="text-align:center; padding:40px;"> Cannot load products. Make sure backend is running.</p>';
        }
    }

    // Get wishlist IDs from localStorage
    function getWishlistIds() {
        return JSON.parse(localStorage.getItem('sigma_wishlist') || '[]');
    }

    // Render wishlist items
    function renderWishlist() {
        const wishlistIds = getWishlistIds();
        const items = wishlistProducts.filter(p => wishlistIds.includes(p.id));
        const grid = document.getElementById('wishlistGrid');
        
        if (items.length === 0) {
            grid.innerHTML = '<p style="text-align:center; padding:40px;">no saved items <br><br><a href="index.html" style="color:#e05a2a;">browse products â†’</a></p>';
            return;
        }
        
        grid.innerHTML = items.map(p => `
            <div class="product-card">
                <div style="position: relative;">
                    <img src="${BACKEND_URL}/uploads/${p.image}" alt="${p.name}" class="product-image" style="width:100%; height:200px; object-fit:cover;">
                </div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">$${p.price}</div>
                    <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                        <button class="add-btn" onclick="addToCartAndRefresh('${p.id}', '${p.name}', ${p.price})">add to cart</button>
                        <button onclick="removeFromWishlist('${p.id}')" style="background:#eee; border:none; padding:0.6rem; border-radius:8px; cursor:pointer;">â™¥ remove</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Add to cart and stay on wishlist page
    function addToCartAndRefresh(id, name, price) {
        addToCart(id, name, price);
        setTimeout(() => renderWishlist(), 500);
    }

    // Remove from wishlist
    function removeFromWishlist(productId) {
        let wishlist = getWishlistIds();
        wishlist = wishlist.filter(id => id !== productId);
        localStorage.setItem('sigma_wishlist', JSON.stringify(wishlist));
        renderWishlist();
        
        // Also refresh the main page's heart colors if it's open
        if (typeof renderProducts === 'function') {
            renderProducts();
        }
        
        // Show toast
        const toast = document.createElement('div');
        toast.innerText = 'âœ“ Removed from wishlist';
        toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#111;color:white;padding:8px 16px;border-radius:30px;z-index:999;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Dark mode
    document.getElementById('darkToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('darkToggle').innerText = isDark ? 'â˜€ï¸' : 'ðŸŒ™';
        localStorage.setItem('sigma_dark', isDark);
    });
    
    if (localStorage.getItem('sigma_dark') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkToggle').innerText = 'â˜€ï¸';
    }
    
    // Update cart count
    function updateCartCountDisplay() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.getElementById('cartCount');
        if (badge) badge.innerText = total;
    }
    
    // Initialize
    loadProducts();
    updateCartCountDisplay();
</script>
