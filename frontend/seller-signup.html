<script>
    const API_URL = 'https://sigma-store-api.onrender.com';
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cartCount').innerText = total;
    }
    
    // Dark mode
    document.getElementById('darkToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('darkToggle').innerText = isDark ? 'â˜€ï¸' : 'ðŸŒ™';
        localStorage.setItem('sigma_dark', isDark);
    });
    
    if (localStorage.getItem('sigma_dark') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkToggle').innerText = 'â˜€ï¸';
    }
    
    // Get auth token from localStorage
    function getAuthToken() {
        return localStorage.getItem('authToken');
    }
    
    // Check if user is logged in
    async function checkLogin() {
        const token = getAuthToken();
        
        if (!token) {
            document.getElementById('loginWarning').style.display = 'block';
            document.getElementById('sellerForm').style.display = 'none';
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/me`, {
                method: 'GET',
                headers: {
                    'Authorization': token
                }
            });
            
            if (response.ok) {
                document.getElementById('loginWarning').style.display = 'none';
                document.getElementById('sellerForm').style.display = 'block';
            } else {
                document.getElementById('loginWarning').style.display = 'block';
                document.getElementById('sellerForm').style.display = 'none';
                localStorage.removeItem('authToken');
            }
        } catch(e) {
            document.getElementById('loginWarning').style.display = 'block';
            document.getElementById('sellerForm').style.display = 'none';
            document.getElementById('loginWarning').innerHTML = ' Cannot connect to backend. Make sure server is running on port 3000';
        }
    }
    
    // Submit seller application
    document.getElementById('sellerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const storeName = document.getElementById('storeName').value;
        const storeDescription = document.getElementById('storeDescription').value;
        const category = document.getElementById('category').value;
        const token = getAuthToken();
        const messageDiv = document.getElementById('message');
        
        if (!token) {
            messageDiv.innerHTML = '<div class="error"> Please login first</div>';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            return;
        }
        
        messageDiv.innerHTML = '<div class="info">Submitting application...</div>';
        
        try {
            const response = await fetch(`${API_URL}/api/seller/apply`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({ storeName, storeDescription, category })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                messageDiv.innerHTML = '<div class="success"> Application submitted! Admin will review your application.</div>';
                document.getElementById('sellerForm').reset();
                setTimeout(() => {
                    window.location.href = 'seller-dashboard.html';
                }, 2000);
            } else {
                messageDiv.innerHTML = '<div class="error"> ' + (data.error || 'Failed to submit application') + '</div>';
            }
        } catch(error) {
            console.error('Error:', error);
            messageDiv.innerHTML = '<div class="error"> Cannot connect to server. Make sure backend is running on port 3000</div>';
        }
    });
    
    updateCartCount();
    checkLogin();
</script>
