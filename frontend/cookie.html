<div id="cookieBanner" style="position:fixed; bottom:0; left:0; right:0; background:#1a1a2e; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; z-index:9999; flex-wrap:wrap; font-family:sans-serif;">  
    <p style="margin:0; font-size:14px;">?? We use cookies to improve your experience. By using our site, you accept our <a href="privacy.html" style="color:#e05a2a; text-decoration:none;">Privacy Policy</a>.</p>  
    <div style="display:flex; gap:10px;">  
        <button onclick="acceptCookies()" style="background:#e05a2a; color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Accept</button>  
        <button onclick="declineCookies()" style="background:#444; color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">Decline</button>  
    </div>  
</div>  
<script>  
function acceptCookies() { localStorage.setItem('cookiesAccepted', 'true'); document.getElementById('cookieBanner').style.display = 'none'; console.log('Cookies accepted'); }  
function declineCookies() { localStorage.setItem('cookiesAccepted', 'false'); document.getElementById('cookieBanner').style.display = 'none'; console.log('Cookies declined'); }  
if (localStorage.getItem('cookiesAccepted') === 'true') { document.getElementById('cookieBanner').style.display = 'none'; }  
</script>
