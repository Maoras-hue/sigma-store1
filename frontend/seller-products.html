<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Store - My Products</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .products-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .add-btn {
            background: linear-gradient(135deg, #e05a2a, #ff8c42);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(224,90,42,0.3);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 1rem;
        }
        
        .product-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .product-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #e05a2a;
            margin: 0.5rem 0;
        }
        
        .product-stock {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .delete-btn {
            flex: 1;
            background: #e05a2a;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #c44a1f;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 20px;
        }
        
        .empty-state p {
            color: #666;
            margin-bottom: 1rem;
        }
        
        .login-prompt {
            background: #fff3e0;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        body.dark .product-card,
        body.dark .empty-state {
            background: #1e293b;
        }
        
        body.dark .product-stock {
            color: #94a3b8;
        }
        
        body.dark .login-prompt {
            background: #1b5e20;
            color: white;
        }
        
        @media (max-width: 768px) {
            .products-container {
                padding: 1rem;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="logo">s SIGMA</a>
    <div class="nav">
        <a href="index.html">shop</a>

</div>

<main>
    <div class="products-container">
        <div class="products-header">
            <h1>?? My Products</h1>
            <a href="seller-add-product.html" class="add-btn">? Add New Product</a>
        </div>
        
        <div id="productsContent">

<script src="config.js"></script>

<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    
    // ============================================
    // CHECK LOGIN AND SELLER STATUS
    // ============================================
    
    function getAuthToken() {
        return localStorage.getItem('authToken');
    }
    
    function isLoggedIn() {
        const token = getAuthToken();
        const expiry = localStorage.getItem('authTokenExpiry');
        if (!token || !expiry) return false;
        return Date.now() < parseInt(expiry);
    }
    
    async function checkSellerStatus() {
        const token = getAuthToken();
        
        try {
            const response = await fetch(`${API_URL}/api/seller/dashboard`, {
                headers: { 'Authorization': token }
            });
            
            if (response.status === 200) {
                const data = await response.json();
                if (data.seller && data.seller.status === 'approved') {
                    return true;
                }
            }
            return false;
        } catch (error) {
            return false;
        }
    }
    
    // ============================================
    // LOAD PRODUCTS
    // ============================================
    
    async function loadProducts() {
        const container = document.getElementById('productsContent');
        const token = getAuthToken();
        
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
        
        try {
            const response = await fetch(`${API_URL}/api/seller/products`, {
                headers: { 'Authorization': token }
            });
            
            if (response.status === 403) {
                container.innerHTML = `
                    <div class="login-prompt">
                        <h3>?? Not an Approved Seller</h3>
                        <p>You need to be an approved seller to view products.</p>
                        <a href="seller-signup.html" class="add-btn" style="margin-top: 1rem; display: inline-block;">Apply Now ?</a>
                    </div>
                `;
                return;
            }
            
            if (!response.ok) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>? Failed to load products</p>
                        <button onclick="loadProducts()" class="add-btn">Try Again</button>
                    </div>
                `;
                return;
            }
            
            const data = await response.json();
            const products = data.products || [];
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>?? You haven't added any products yet.</p>
                        <a href="seller-add-product.html" class="add-btn">Add Your First Product ?</a>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="products-grid">';
            
            for (let product of products) {
                let imgSrc = product.image;
                if (imgSrc && imgSrc.startsWith('http')) {
                    imgSrc = imgSrc;
                } else if (imgSrc) {
                    imgSrc = `${API_URL}/uploads/${imgSrc}`;
                } else {
                    imgSrc = `https://placehold.co/400x300/1a1a2e/white?text=${encodeURIComponent(product.name)}`;
                }
                
                html += `
                    <div class="product-card">
                        <img src="${imgSrc}" class="product-image" onerror="this.src='https://placehold.co/400x300/ff6b6b/white?text=Image+Error'">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-price">$${product.price}</div>
                            <div class="product-stock">?? Stock: ${product.stock || 999}</div>
                            <div class="product-actions">
                                <button class="delete-btn" onclick="deleteProduct('${product.id}')">??? Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            container.innerHTML = html;
            
        } catch (error) {
            console.error('Load products error:', error);
            container.innerHTML = `
                <div class="empty-state">
                    <p>?? Cannot connect to server</p>
                    <button onclick="loadProducts()" class="add-btn">Retry</button>
                </div>
            `;
        }
    }
    
    // ============================================
    // DELETE PRODUCT
    // ============================================
    
    async function deleteProduct(productId) {
        if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) {
            return;
        }
        
        const token = getAuthToken();
        
        try {
            const response = await fetch(`${API_URL}/api/seller/products/${productId}`, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            
            if (response.ok) {
                alert('? Product deleted successfully');
                loadProducts();
            } else {
                alert('? Failed to delete product');
            }
        } catch (error) {
            console.error('Delete error:', error);
            alert('Cannot connect to server');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============================================
    // RENDER PAGE
    // ============================================
    
    async function renderPage() {
        if (!isLoggedIn()) {
            document.getElementById('productsContent').innerHTML = `
                <div class="login-prompt">
                    <h3>?? Please Login</h3>
                    <p>You need to be logged in to view your products.</p>
                    <a href="login.html" class="add-btn" style="margin-top: 1rem; display: inline-block;">Login Now ?</a>
                </div>
            `;
            return;
        }
        
        const isSeller = await checkSellerStatus();
        
        if (!isSeller) {
            document.getElementById('productsContent').innerHTML = `
                <div class="login-prompt">
                    <h3>?? Become a Seller First</h3>
                    <p>You need to be an approved seller to add and manage products.</p>
                    <a href="seller-signup.html" class="add-btn" style="margin-top: 1rem; display: inline-block;">Apply Now ?</a>
                </div>
            `;
            return;
        }
        
        loadProducts();
    }
    
    // ============================================
    // INITIALIZE
    // ============================================
    
    document.addEventListener('DOMContentLoaded', () => {
        updateCartCount();
        renderPage();
    });
    
    // Make function global
    window.deleteProduct = deleteProduct;
</script>

</body>
</html>
