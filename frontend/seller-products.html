<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product-info {
            padding: 1rem;
        }
        .delete-btn {
            background: #e05a2a;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        body.dark .product-card {
            background: #1e1e1e;
            border-color: #333;
        }
    </style>

<main>
    <div class="container">
        <h2> My Products</h2>
        <button onclick="location.href='seller-add-product.html'" style="background: #111; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 1rem;">âž• Add New Product</button>
        <div id="productsGrid" class="products-grid">Loading...</div>
    </div>
</main>

<footer>
    <p>sigma studio â€” mardan, pk</p>
</footer>

<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.getElementById('cartCount');
        if (badge) badge.innerText = total;
    }
    
    document.getElementById('darkToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('darkToggle').innerText = isDark ? 'â˜€ï¸' : 'ðŸŒ™';
        localStorage.setItem('sigma_dark', isDark);
    });
    
    if (localStorage.getItem('sigma_dark') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkToggle').innerText = 'â˜€ï¸';
    }
    
    async function loadProducts() {
        try {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            const response = await fetch(`${API_URL}/api/seller/products`, {
                headers: {
                    'Authorization': token
                }
            });
            
            if (response.status === 401) {
                window.location.href = 'login.html';
                return;
            }
            
            if (response.ok) {
                const data = await response.json();
                const grid = document.getElementById('productsGrid');
                
                if (!data.products || data.products.length === 0) {
                    grid.innerHTML = '<p style="text-align: center;">No products yet. <a href="seller-add-product.html">Add your first product</a></p>';
                } else {
                    grid.innerHTML = data.products.map(p => {
                        let imgSrc = p.image;
                        if (imgSrc && imgSrc.startsWith('http')) {
                            imgSrc = imgSrc;
                        } else if (imgSrc) {
                            imgSrc = `${API_URL}/uploads/${imgSrc}`;
                        } else {
                            imgSrc = `https://placehold.co/300x200/111/white?text=${encodeURIComponent(p.name)}`;
                        }
                        return `
                            <div class="product-card">
                                <img src="${imgSrc}" onerror="this.src='https://placehold.co/300x200'">
                                <div class="product-info">
                                    <h3>${escapeHtml(p.name)}</h3>
                                    <p>$${p.price}</p>
                                    <p>Stock: ${p.stock}</p>
                                    <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } else if (response.status === 403) {
                grid.innerHTML = '<p style="text-align: center;">You are not approved as a seller yet. <a href="seller-signup.html">Apply here</a></p>';
            } else {
                grid.innerHTML = '<p style="text-align: center;">Error loading products. Please try again.</p>';
            }
        } catch(e) {
            console.error('Error:', e);
            document.getElementById('productsGrid').innerHTML = '<p style="text-align: center;">Error connecting to server. Make sure you are logged in.</p>';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function deleteProduct(productId) {
        if (confirm('Are you sure you want to delete this product?')) {
            const token = localStorage.getItem('authToken');
            const response = await fetch(`${API_URL}/api/seller/products/${productId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': token || ''
                }
            });
            
            if (response.ok) {
                loadProducts();
            } else {
                alert('Failed to delete product');
            }
        }
    }
    
    loadProducts();
    updateCartCount();
</script>
