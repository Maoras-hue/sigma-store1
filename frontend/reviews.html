<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews - Sigma Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .review-card { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eee; }
        .write-review { background: #f5f5f5; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .rating-star { cursor: pointer; font-size: 30px; color: #ddd; display: inline-block; }
        .rating-star.active { color: #ffc107; }
        body.dark .review-card { background: #1e1e1e; }
        body.dark .write-review { background: #2a2a2a; }
    </style>

<body>
<div class="header">
    <a href="index.html" class="logo">Ïƒ SIGMA</a>
    <div class="nav">
        <a href="index.html">shop</a>
        <a href="reviews.html">reviews</a>
        <a href="login.html" id="authLink">login</a>
    </div>
    <button class="dark-toggle" id="darkToggle">ðŸŒ™</button>
    <a href="cart.html" class="cart-btn">cart (<span id="cartCount">0</span>)</a>
</div>
<main>
    <div class="container">
        <h2>â­ Product Reviews</h2>
        <div class="write-review">
            <h3>Write a Review</h3>
            <select id="productSelect" style="width:100%; padding:10px; margin-bottom:1rem;">
                <option value="">Select a product</option>
            </select>
            <div id="ratingStars" style="margin:10px 0;">
                <span class="rating-star" data-rating="1">â˜†</span>
                <span class="rating-star" data-rating="2">â˜†</span>
                <span class="rating-star" data-rating="3">â˜†</span>
                <span class="rating-star" data-rating="4">â˜†</span>
                <span class="rating-star" data-rating="5">â˜†</span>
            </div>
            <textarea id="reviewComment" rows="3" placeholder="Share your experience..." style="width:100%; padding:10px;"></textarea>
            <button id="submitBtn" style="margin-top:10px; background:#e05a2a; color:white; border:none; padding:10px 20px; border-radius:5px;">Submit Review</button>
        </div>
        <div id="reviewsList">Select a product to see reviews</div>
    </div>
</main>
<footer><p>Sigma Studio</p></footer>
<script src="config.js"></script>
<script src="navbar.js"></script>
<script>
    const API_URL = window.BACKEND_URL || 'https://sigma-store-api.onrender.com';
    let selectedRating = 0;
    let products = [];
    
    document.querySelectorAll('.rating-star').forEach(star => {
        star.onclick = function() {
            selectedRating = parseInt(this.dataset.rating);
            document.querySelectorAll('.rating-star').forEach(s => {
                if(parseInt(s.dataset.rating) <= selectedRating) {
                    s.innerHTML = 'â˜…';
                    s.classList.add('active');
                } else {
                    s.innerHTML = 'â˜†';
                    s.classList.remove('active');
                }
            });
        };
    });
    
    async function loadProducts() {
        const res = await fetch(API_URL + '/api/products');
        products = await res.json();
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">Select a product</option>' + products.map(p => `<option value="${p.id}">${p.name} - $${p.price}</option>`).join('');
    }
    
    async function loadReviews(productId) {
        if(!productId) { document.getElementById('reviewsList').innerHTML = '<p>Select a product to see reviews</p>'; return; }
        const res = await fetch(API_URL + '/api/products/' + productId + '/reviews');
        const data = await res.json();
        const reviews = data.reviews || [];
        if(reviews.length === 0) { document.getElementById('reviewsList').innerHTML = '<p>No reviews yet. Be the first!</p>'; return; }
        document.getElementById('reviewsList').innerHTML = reviews.map(r => `
            <div class="review-card">
                <strong>${r.user_name}</strong> - ${'â˜…'.repeat(r.rating)}${'â˜†'.repeat(5-r.rating)}<br>
                <small>${new Date(r.created_at).toLocaleDateString()}</small>
                <p>${r.comment}</p>
            </div>
        `).join('');
    }
    
    document.getElementById('productSelect').onchange = (e) => loadReviews(e.target.value);
    
    document.getElementById('submitBtn').onclick = async () => {
        const productId = document.getElementById('productSelect').value;
        const comment = document.getElementById('reviewComment').value;
        const token = localStorage.getItem('authToken');
        if(!productId) { alert('Select a product'); return; }
        if(!selectedRating) { alert('Select a rating'); return; }
        if(!token) { alert('Please login'); window.location.href='login.html'; return; }
        
        const res = await fetch(API_URL + '/api/products/' + productId + '/reviews', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ rating: selectedRating, comment })
        });
        if(res.ok) {
            alert('Review submitted!');
            document.getElementById('reviewComment').value = '';
            selectedRating = 0;
            document.querySelectorAll('.rating-star').forEach(s => { s.innerHTML = 'â˜†'; s.classList.remove('active'); });
            loadReviews(productId);
        } else { alert('Failed to submit'); }
    };
    
    loadProducts();
</script>
</body>
