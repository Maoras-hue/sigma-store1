<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f5f5f5;}
        .header{background:#e05a2a;color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
        .container{display:flex;height:calc(100vh - 60px);}
        .users-list{width:320px;background:white;border-right:1px solid #ddd;overflow-y:auto;}
        .user-item{padding:15px;border-bottom:1px solid #eee;cursor:pointer;}
        .user-item:hover{background:#f8f9fa;}
        .user-item.active{background:#fff3e0;border-left:3px solid #e05a2a;}
        .user-name{font-weight:bold;margin-bottom:5px;}
        .user-last{font-size:12px;color:#888;}
        .chat-area{flex:1;display:flex;flex-direction:column;background:white;}
        .chat-header{padding:15px;border-bottom:1px solid #ddd;background:#f8f9fa;}
        .chat-messages{flex:1;padding:15px;overflow-y:auto;}
        .message{margin-bottom:10px;padding:10px 14px;border-radius:10px;max-width:70%;word-wrap:break-word;}
        .message.customer{background:#e05a2a;color:white;margin-left:auto;text-align:right;}
        .message.admin{background:#e9ecef;color:#333;}
        .chat-input-area{display:flex;padding:15px;border-top:1px solid #ddd;}
        .chat-input-area input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;outline:none;}
        .chat-input-area button{margin-left:10px;padding:12px 24px;background:#e05a2a;color:white;border:none;border-radius:8px;cursor:pointer;}
        .login-container{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
        .login-box{background:white;padding:30px;border-radius:16px;width:320px;text-align:center;}
        .login-box h2{margin-bottom:20px;color:#e05a2a;}
        .login-box input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
        .login-box button{width:100%;padding:12px;background:#e05a2a;color:white;border:none;border-radius:8px;cursor:pointer;}
        .error{color:red;margin-top:10px;}
        .no-users{padding:15px;text-align:center;color:#888;}
        .refresh-btn{background:#e05a2a;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;}
        .auto-refresh-status{font-size:12px;color:#4caf50;margin-left:10px;}
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button onclick="login()">Login</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <div id="adminPanel" style="display:none;">
        <div class="header">
            <h2>Support Chat Panel <span id="autoStatus" class="auto-refresh-status">(Auto-refresh ON)</span></h2>
            <div>
                <button class="refresh-btn" onclick="loadUsers()">Refresh</button>
                <button onclick="logout()" style="background:white;color:#e05a2a;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-left:10px;">Logout</button>
            </div>
        </div>
        <div class="container">
            <div class="users-list" id="usersList">
                <div class="no-users">Loading users...</div>
            </div>
            <div class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <h3>Select a user to start chatting</h3>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type your message...">
                    <button onclick="sendAdminMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = null;
        var currentUserId = null;
        var API_URL = window.location.origin;
        var ADMIN_PASSWORD = 'sigma123';
        var autoRefreshInterval = null;
        
        function login() {
            var password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                initSocket();
                loadUsers();
                startAutoRefresh();
            } else {
                document.getElementById('loginError').innerText = 'Wrong password';
            }
        }
        
        function logout() {
            stopAutoRefresh();
            localStorage.removeItem('adminLoggedIn');
            if (socket) socket.disconnect();
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(function() {
                loadUsers();
                if (currentUserId) {
                    loadChatHistory(currentUserId);
                }
            }, 3000);
            document.getElementById('autoStatus').innerText = '(Auto-refresh ON - every 3 sec)';
        }
        
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }
        
        function initSocket() {
            socket = io(API_URL);
            socket.on('connect', function() {
                console.log('Admin connected');
                socket.emit('admin-join');
            });
            socket.on('new-message', function(data) {
                if (data.userId === currentUserId && !data.isAdmin) {
                    addMessageToChat(data.message, false);
                }
                loadUsers();
            });
        }
        
        async function loadUsers() {
            try {
                var response = await fetch(API_URL + '/api/admin/chats');
                var data = await response.json();
                var usersList = document.getElementById('usersList');
                
                if (data.chats && data.chats.length > 0) {
                    var html = '';
                    for (var i = 0; i < data.chats.length; i++) {
                        var chat = data.chats[i];
                        var activeClass = (currentUserId === chat.user_id) ? 'active' : '';
                        html += '<div class="user-item ' + activeClass + '" onclick="selectUser(\'' + chat.user_id + '\', \'' + chat.user_name.replace(/'/g, "\\'") + '\')">' +
                            '<div class="user-name">' + chat.user_name + '</div>' +
                            '<div class="user-last">' + new Date(chat.last_message).toLocaleString() + '</div>' +
                            '</div>';
                    }
                    usersList.innerHTML = html;
                } else {
                    usersList.innerHTML = '<div class="no-users">No users yet. Send a message from the website first.</div>';
                }
            } catch(e) {
                console.error('Load users error:', e);
            }
        }
        
        async function loadChatHistory(userId) {
            try {
                var response = await fetch(API_URL + '/api/chat/history/' + userId);
                var data = await response.json();
                var messagesDiv = document.getElementById('chatMessages');
                messagesDiv.innerHTML = '';
                
                if (data.messages && data.messages.length > 0) {
                    for (var i = 0; i < data.messages.length; i++) {
                        var msg = data.messages[i];
                        var messageDiv = document.createElement('div');
                        messageDiv.className = 'message ' + (msg.is_admin ? 'admin' : 'customer');
                        messageDiv.textContent = msg.message;
                        messagesDiv.appendChild(messageDiv);
                    }
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else {
                    messagesDiv.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">No messages yet.</div>';
                }
            } catch(e) {
                console.error('Load history error:', e);
            }
        }
        
        async function selectUser(userId, userName) {
            currentUserId = userId;
            document.getElementById('chatHeader').innerHTML = '<h3>Chatting with: ' + userName + '</h3>';
            
            var items = document.querySelectorAll('.user-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
            if (event && event.target) {
                var el = event.target.closest('.user-item');
                if (el) el.classList.add('active');
            }
            
            await loadChatHistory(userId);
        }
        
        function addMessageToChat(message, isCustomer) {
            var messagesDiv = document.getElementById('chatMessages');
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.indexOf('No messages yet') !== -1) {
                messagesDiv.innerHTML = '';
            }
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isCustomer ? 'customer' : 'admin');
            messageDiv.textContent = message;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function sendAdminMessage() {
            var input = document.getElementById('chatInput');
            var message = input.value.trim();
            if (!message || !currentUserId) {
                if (!currentUserId) alert('Please select a user first');
                return;
            }
            
            addMessageToChat(message, false);
            
            if (socket) {
                socket.emit('admin-message', {
                    userId: currentUserId,
                    message: message
                });
            }
            
            try {
                await fetch(API_URL + '/api/chat/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        userName: 'Admin',
                        message: message,
                        isAdmin: true
                    })
                });
            } catch(e) {
                console.error('Save error:', e);
            }
            
            input.value = '';
        }
        
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendAdminMessage();
        });
        
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            initSocket();
            loadUsers();
            startAutoRefresh();
        }
    </script>
</body>
</html>
